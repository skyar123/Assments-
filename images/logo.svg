<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- ConnectEd Circles logo — overlapping circles flower pattern -->
  <g fill="none" stroke="#2d4a32" stroke-width="1.2" transform="translate(100,95)">
    <!-- 6 circles arranged in a flower pattern -->
    <circle cx="0" cy="-35" r="35"/>
    <circle cx="30.3" cy="-17.5" r="35"/>
    <circle cx="30.3" cy="17.5" r="35"/>
    <circle cx="0" cy="35" r="35"/>
    <circle cx="-30.3" cy="17.5" r="35"/>
    <circle cx="-30.3" cy="-17.5" r="35"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="20"/>
  </g>
  <!-- Text along curved path -->
  <defs>
    <path id="textArc" d="M 20,195 A 140,140 0 0,0 180,195"/>
  </defs>
  <text font-family="'Fraunces', Georgia, serif" font-size="20" font-weight="500" fill="#1a1a1a">
    <textPath href="#textArc" startOffset="50%" text-anchor="middle">ConnectEd Circles</textPath>
  </text>
</svg>
