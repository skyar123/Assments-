<!-- Option A: Ghost Signup Form widget (matches your site's palette) -->
<div style="height: 40vmin; min-height: 360px">
  <script
    src="https://cdn.jsdelivr.net/ghost/signup-form@~0.3/umd/signup-form.min.js"
    data-background-color="#faf8f4"
    data-text-color="#2d2d2d"
    data-button-color="#d17a4a"
    data-button-text-color="#FFFFFF"
    data-title="ConnectEd Circles"
    data-description="Clinical reflections, practical tools, and honest thinking from the team."
    data-site="https://connected-circles.ghost.io/"
    data-locale="en"
    async>
  </script>
</div>
